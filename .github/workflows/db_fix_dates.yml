name: DB Fix Community Dates (One-time)

"on":
  workflow_dispatch:
    inputs:
      dry_run:
        description: "DRY_RUN=true: 확인만 / false: 실제 업데이트"
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install supabase python-dotenv
      - name: Run DB fix
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          DRY_RUN: ${{ github.event.inputs.dry_run }}
        run: python3 db_fix_community_dates.py
