name: Check Stats

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_TOKEN }}
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install supabase requests -q
      - name: 진단 실행
        run: python3 diagnose.py > check_result.txt 2>&1; cat check_result.txt
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
      - name: DB 통계
        run: |
          python3 << 'PYEOF' >> check_result.txt 2>&1
          import os
          from supabase import create_client
          from datetime import datetime, timezone, timedelta
          from collections import Counter, defaultdict
          KST = timezone(timedelta(hours=9))
          sb = create_client(os.getenv("SUPABASE_URL"), os.getenv("SUPABASE_KEY"))
          r = sb.table("community_posts").select("community,posted_at,collected_at") \
              .gte("collected_at",(datetime.now(KST)-timedelta(days=2)).isoformat()) \
              .limit(5000).execute()
          posts = r.data
          print(f"\n최근 2일 수집: {len(posts)}건")
          comm_cnt = Counter(p['community'] for p in posts)
          for c,n in sorted(comm_cnt.items(),key=lambda x:-x[1]):
              print(f"  {c:15}: {n}건")
          PYEOF
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
      - name: 결과 커밋
        run: |
          git config user.email "action@github.com"
          git config user.name "GitHub Actions"
          git add check_result.txt diagnose.py
          git diff --cached --quiet || git commit -m "chore: diagnose result"
          git push
