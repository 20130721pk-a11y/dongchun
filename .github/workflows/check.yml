name: Check Stats

on:
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install supabase python-dotenv requests -q
      - name: DB 수집 현황 확인
        run: |
          python3 << 'PYEOF'
          import os
          from supabase import create_client
          from datetime import datetime, timezone, timedelta
          from collections import Counter, defaultdict

          KST = timezone(timedelta(hours=9))
          sb = create_client(os.getenv("SUPABASE_URL"), os.getenv("SUPABASE_KEY"))

          print("=" * 60)
          print("커뮤니티 수집 현황")
          print("=" * 60)

          # 최근 7일 전체 조회
          r = sb.table("community_posts").select("community,keyword,posted_at,collected_at").gte(
              "collected_at",
              (datetime.now(KST) - timedelta(days=7)).isoformat()
          ).limit(5000).execute()
          posts = r.data
          print(f"최근 7일 총 수집: {len(posts)}건")

          comm_cnt = Counter(p['community'] for p in posts)
          print("\n[커뮤니티별]")
          for c, n in sorted(comm_cnt.items(), key=lambda x:-x[1]):
              print(f"  {c:15}: {n}건")

          # 날짜별
          date_cnt = defaultdict(int)
          for p in posts:
              ct = p.get('collected_at','')
              if ct:
                  try:
                      d = datetime.fromisoformat(ct.replace('Z','+00:00')).astimezone(KST)
                      date_cnt[d.strftime('%m/%d')] += 1
                  except: pass
          print("\n[날짜별 (collected_at 기준)]")
          for d in sorted(date_cnt):
              print(f"  {d}: {date_cnt[d]}건")

          # 키워드별
          kw_cnt = Counter(p['keyword'] for p in posts if p.get('keyword'))
          print("\n[키워드별 TOP10]")
          for k, n in kw_cnt.most_common(10):
              print(f"  {k:20}: {n}건")

          print("\n" + "=" * 60)
          print("네이버 API 직접 테스트")
          print("=" * 60)
          import requests
          naver_id = os.getenv("NAVER_CLIENT_ID")
          naver_secret = os.getenv("NAVER_CLIENT_SECRET")
          if not naver_id:
              print("❌ NAVER_CLIENT_ID 없음!")
          else:
              print(f"✅ NAVER_CLIENT_ID 존재: {naver_id[:8]}...")
              h = {"X-Naver-Client-Id": naver_id, "X-Naver-Client-Secret": naver_secret,
                   "User-Agent": "Mozilla/5.0"}
              # webkr 테스트
              for q, ep in [
                  ("배틀그라운드 site:arca.live", "https://openapi.naver.com/v1/search/webkr.json"),
                  ("배틀그라운드 site:fmkorea.com", "https://openapi.naver.com/v1/search/webkr.json"),
                  ("배틀그라운드 site:inven.co.kr", "https://openapi.naver.com/v1/search/webkr.json"),
                  ("배틀그라운드 thisisgame", "https://openapi.naver.com/v1/search/news.json"),
              ]:
                  resp = requests.get(ep, headers=h, params={"query": q, "display": 10, "sort": "date"}, timeout=10)
                  items = resp.json().get("items", []) if resp.status_code == 200 else []
                  print(f"  [{resp.status_code}] '{q}': {len(items)}건")
                  if items:
                      print(f"    최신: {items[0].get('postdate') or items[0].get('pubDate','?')[:20]} | {items[0].get('title','')[:40]}")
          PYEOF
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
