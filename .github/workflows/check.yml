name: Check Stats

on:
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install supabase requests -q
      - name: DB 수집 현황 확인
        run: |
          python3 << 'PYEOF'
          import os, json, requests
          from supabase import create_client
          from datetime import datetime, timezone, timedelta
          from collections import Counter, defaultdict

          KST = timezone(timedelta(hours=9))
          sb = create_client(os.getenv("SUPABASE_URL"), os.getenv("SUPABASE_KEY"))
          out = []
          log = lambda s: out.append(s)

          # ── 커뮤니티 7일 현황 ──
          r = sb.table("community_posts").select("community,keyword,posted_at,collected_at") \
              .gte("collected_at", (datetime.now(KST)-timedelta(days=7)).isoformat()) \
              .limit(5000).execute()
          posts = r.data
          log(f"최근 7일 총 수집: {len(posts)}건")

          comm_cnt = Counter(p['community'] for p in posts)
          log("\n[커뮤니티별]")
          for c,n in sorted(comm_cnt.items(), key=lambda x:-x[1]):
              log(f"  {c:15}: {n}건")

          date_cnt = defaultdict(int)
          for p in posts:
              ct = p.get('collected_at','')
              if ct:
                  try:
                      d=datetime.fromisoformat(ct.replace('Z','+00:00')).astimezone(KST)
                      date_cnt[d.strftime('%m/%d')] += 1
                  except: pass
          log("\n[날짜별 (collected_at)]")
          for d in sorted(date_cnt):
              log(f"  {d}: {date_cnt[d]}건")

          kw_cnt = Counter(p['keyword'] for p in posts if p.get('keyword'))
          log("\n[키워드별 TOP10]")
          for k,n in kw_cnt.most_common(10):
              log(f"  {k:20}: {n}건")

          # ── 네이버 API 테스트 ──
          log("\n[네이버 API 직접 테스트]")
          nid = os.getenv("NAVER_CLIENT_ID")
          nsec = os.getenv("NAVER_CLIENT_SECRET")
          if not nid:
              log("❌ NAVER_CLIENT_ID 없음!")
          else:
              log(f"✅ NAVER_CLIENT_ID: {nid[:8]}***")
              h = {"X-Naver-Client-Id":nid,"X-Naver-Client-Secret":nsec,
                   "User-Agent":"Mozilla/5.0"}
              tests = [
                  ("배틀그라운드 site:arca.live",    "https://openapi.naver.com/v1/search/webkr.json"),
                  ("배틀그라운드 site:fmkorea.com",  "https://openapi.naver.com/v1/search/webkr.json"),
                  ("배틀그라운드 site:inven.co.kr",  "https://openapi.naver.com/v1/search/webkr.json"),
                  ("배틀그라운드 site:bbs.ruliweb.com","https://openapi.naver.com/v1/search/webkr.json"),
                  ("배틀그라운드 thisisgame",         "https://openapi.naver.com/v1/search/news.json"),
                  ("배틀그라운드",                   "https://openapi.naver.com/v1/search/cafearticle.json"),
              ]
              for q,ep in tests:
                  try:
                      resp=requests.get(ep,headers=h,params={"query":q,"display":5,"sort":"date"},timeout=10)
                      if resp.status_code==200:
                          items=resp.json().get("items",[])
                          log(f"  ✅ [{len(items)}건] {q}")
                          if items:
                              i0=items[0]
                              date=i0.get('postdate') or i0.get('pubDate','?')
                              log(f"    최신: {str(date)[:20]} | {i0.get('title','')[:50]}")
                      else:
                          log(f"  ❌ [{resp.status_code}] {q}: {resp.text[:80]}")
                  except Exception as e:
                      log(f"  ❌ {q}: {e}")

          result = "\n".join(out)
          print(result)
          with open("check_result.txt","w") as f: f.write(result)
          PYEOF
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
      - name: 결과 파일 push
        run: |
          git config user.email "action@github.com"
          git config user.name "GitHub Actions"
          git add check_result.txt
          git commit -m "chore: check result $(date '+%Y-%m-%d %H:%M')" || echo "변경없음"
          git push "https://x-access-token:${{ secrets.GH_TOKEN }}@github.com/20130721pk-a11y/dongchun.git" main
